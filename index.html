<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CryptoGPU | Telegram Mining</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://telegram.org/js/telegram-web-app.js?56"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: #0B0E1A; font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; color: #fff; padding-bottom: 90px; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 30% 40%, #121936 0%, #070A14 100%); z-index: -2; }
  .header { background: rgba(8, 12, 24, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0, 212, 255, 0.2); padding: 12px 20px 16px; border-radius: 0 0 28px 28px; }
  .user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; background: rgba(0, 0, 0, 0.3); padding: 8px 12px; border-radius: 44px; }
  .avatar { width: 44px; height: 44px; background: linear-gradient(135deg, #00D4FF, #0066FF); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }
  .user-name { flex: 1; }
  .user-name h3 { font-size: 16px; margin-bottom: 2px; }
  .user-name p { font-size: 10px; color: #6B7CA8; }
  .user-id { font-family: monospace; font-size: 11px; background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 20px; }
  .balance-container { display: flex; gap: 12px; flex-wrap: wrap; }
  .balance-card { flex: 1; background: linear-gradient(135deg, rgba(0, 50, 100, 0.4), rgba(0, 20, 50, 0.6)); border-radius: 20px; padding: 10px 14px; backdrop-filter: blur(10px); border: 1px solid rgba(0, 212, 255, 0.25); }
  .balance-label { font-size: 10px; color: #8EA3D4; margin-bottom: 5px; }
  .balance-value { display: flex; align-items: center; gap: 6px; }
  .balance-value span.amt { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #FFF, #A0C4FF); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .gpu-currency { background: linear-gradient(135deg, #FFB347, #FF8C00); border-radius: 30px; padding: 2px 6px; font-size: 9px; font-weight: bold; color: #1A1F2E; }
  .ton-pill { background: linear-gradient(135deg, #00D4FF, #0066FF); border-radius: 30px; padding: 2px 8px; font-size: 9px; font-weight: bold; color: #0B0E1A; }
  .grid { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .card { background: rgba(12, 18, 32, 0.75); backdrop-filter: blur(12px); border-radius: 24px; padding: 12px; display: flex; gap: 12px; align-items: center; border: 1px solid rgba(0, 212, 255, 0.2); }
  .gpu-img { width: 65px; height: 65px; object-fit: contain; background: rgba(0, 0, 0, 0.4); border-radius: 18px; padding: 8px; }
  .card-info { flex: 1; min-width: 0; }
  .card-info h3 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
  .badge { background: rgba(0, 212, 255, 0.2); padding: 2px 6px; border-radius: 20px; font-size: 8px; color: #00D4FF; }
  .rewards-info { display: flex; gap: 10px; font-size: 10px; color: #A0B4E0; margin-bottom: 6px; }
  button { background: linear-gradient(95deg, #1A2A5E, #0F1A3A); border: none; font-weight: 600; font-size: 12px; padding: 8px 12px; border-radius: 40px; color: white; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .claim-btn { background: linear-gradient(95deg, #008A5C, #00A86B); }
  .progress-bar { width: 100%; height: 24px; background: rgba(0, 0, 0, 0.5); border-radius: 40px; overflow: hidden; position: relative; margin-top: 6px; border: 1px solid rgba(0, 212, 255, 0.3); }
  .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00D4FF, #0066FF); border-radius: 40px; transition: width 0.2s linear; }
  .progress-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; gap: 3px; }
  .ref-stats { background: linear-gradient(135deg, #1A1F35, #11152A); margin: 16px; padding: 16px; border-radius: 28px; text-align: center; border: 1px solid rgba(255, 180, 71, 0.3); }
  .friend-count { font-size: 40px; font-weight: 800; background: linear-gradient(135deg, #FFB347, #FF8C00); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .friends-list { margin-top: 16px; max-height: 250px; overflow-y: auto; }
  .friend-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: rgba(0, 0, 0, 0.3); border-radius: 40px; margin-bottom: 6px; }
  .friend-avatar { width: 32px; height: 32px; background: linear-gradient(135deg, #FFB347, #FF8C00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }
  .friend-info { flex: 1; text-align: left; }
  .friend-name { font-size: 13px; font-weight: 600; }
  .friend-date { font-size: 9px; color: #8EA3D4; }
  .ref-link-box { background: rgba(0, 0, 0, 0.4); margin: 12px 16px; padding: 10px 14px; border-radius: 60px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .ref-link-box span { font-size: 10px; font-family: monospace; color: #FFD699; word-break: break-all; }
  .copy-btn { width: auto; padding: 6px 14px; background: #FF8C00; margin: 0; }
  .bottom-nav { position: fixed; bottom: 10px; left: 10px; right: 10px; background: rgba(8, 12, 24, 0.95); backdrop-filter: blur(20px); border-radius: 44px; display: flex; justify-content: space-around; padding: 5px 8px; border: 1px solid rgba(0, 212, 255, 0.25); z-index: 100; }
  .nav-btn { background: transparent !important; box-shadow: none !important; width: auto !important; padding: 8px 16px !important; font-size: 20px !important; color: #5A6A8A !important; margin: 0 !important; }
  .nav-btn.active { color: #00D4FF !important; background: rgba(0, 212, 255, 0.15) !important; }
  .tab { display: none; animation: fade 0.25s ease; }
  .tab.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .loading { text-align: center; padding: 40px; color: #6B7CA8; }
  .deposit-box { margin: 16px; padding: 18px; border-radius: 24px; background: linear-gradient(135deg, #1A1F35, #11152A); border: 1px solid rgba(0, 212, 255, 0.3); }
  .deposit-box h3 { margin-bottom: 12px; font-size: 16px; }
  .deposit-box label { display: block; font-size: 11px; color: #8EA3D4; margin-bottom: 6px; }
  .deposit-box input { width: 100%; background: rgba(0,0,0,0.4); color: #fff; border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 12px; padding: 12px; font-size: 16px; outline: none; margin-bottom: 10px; }
  .deposit-box input:focus { border-color: #00D4FF; }
  .deposit-box .pay-btn { margin-top: 4px; background: linear-gradient(95deg, #00D4FF, #0066FF); color: #0B0E1A; }
  .deposit-box .wd-btn { margin-top: 4px; background: linear-gradient(95deg, #FF8C00, #FFB347); color: #0B0E1A; }
  .pay-info { background: rgba(0,0,0,0.4); border-radius: 14px; padding: 12px; margin-top: 14px; font-size: 12px; word-break: break-all; }
  .pay-info .row { margin-bottom: 8px; }
  .pay-info .lbl { color: #8EA3D4; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .pay-info .val { font-family: monospace; color: #FFD699; background: rgba(0,0,0,0.4); padding: 6px 10px; border-radius: 8px; display: inline-block; max-width: 100%; word-break: break-all; }
  .pay-info .copy-mini { background: #FF8C00; padding: 4px 10px; font-size: 11px; width: auto; margin-left: 6px; display: inline-flex; }
  .pay-warn { background: rgba(255, 140, 0, 0.15); border: 1px solid rgba(255, 140, 0, 0.4); border-radius: 12px; padding: 10px; margin-top: 10px; font-size: 11px; color: #FFD699; }
  .pay-ok { background: rgba(0, 212, 255, 0.12); border: 1px solid rgba(0, 212, 255, 0.4); border-radius: 12px; padding: 10px; margin-top: 10px; font-size: 11px; color: #A0E8FF; }
  .pay-err { background: rgba(255, 60, 60, 0.15); border: 1px solid rgba(255, 60, 60, 0.4); border-radius: 12px; padding: 10px; margin-top: 10px; font-size: 11px; color: #FFB0B0; }
  .gpu-emoji { font-size: 50px; line-height: 65px; width: 65px; text-align: center; }
</style>
</head>
<body>

<div id="app" style="display:none">
<div class="header">
  <div class="user-info">
    <div class="avatar" id="avatar">👤</div>
    <div class="user-name">
      <h3 id="userFirstName">Загрузка...</h3>
      <p id="userStatus">Telegram ID: ---</p>
    </div>
    <div class="user-id" id="userIdShort">---</div>
  </div>

  <div class="balance-container">
    <div class="balance-card">
      <div class="balance-label">💰 TON Balance</div>
      <div class="balance-value">
        <span class="amt" id="ton">0.00</span>
        <span class="ton-pill">TON</span>
      </div>
    </div>
    <div class="balance-card">
      <div class="balance-label">⚡ GPU Tokens</div>
      <div class="balance-value">
        <span class="amt" id="gpuBalance">0</span>
        <span class="gpu-currency">GPU</span>
      </div>
    </div>
  </div>
</div>

<div id="home" class="tab active">
  <div class="grid" id="grid"></div>
</div>

<div id="referral" class="tab">
  <div class="ref-stats">
    <h3>👥 Приглашено друзей</h3>
    <div class="friend-count" id="friendCount">0</div>
    <div class="badge" style="display:inline-block; margin-top:4px;">5 друзей → 1 TON + 5 GPU | 50 → 10 TON + 50 GPU</div>
    <div id="refClaimBox" style="margin-top:12px;"></div>
    <div class="friends-list" id="friendsList">
      <div style="text-align:center; padding:10px; color:#6B7CA8;">У вас пока нет приглашённых друзей</div>
    </div>
  </div>

  <div class="ref-link-box">
    <span id="refLink">загрузка...</span>
    <button class="copy-btn" id="copyRefBtn">📋</button>
  </div>
</div>

<div id="staking" class="tab"><div class="ref-stats"><i class="fa-solid fa-chart-line" style="font-size:48px;"></i><h3>Staking Pool</h3><p>Скоро</p></div></div>
<div id="tasks" class="tab"><div class="ref-stats"><i class="fa-solid fa-list-check" style="font-size:48px;"></i><h3>Задания</h3><p>Скоро</p></div></div>

<div id="wallet" class="tab">
  <div class="deposit-box">
    <h3>💳 Пополнить баланс TON</h3>
    <label>Сумма пополнения (TON)</label>
    <input id="depositAmount" type="number" min="0.1" step="0.1" placeholder="Например, 5">
    <button class="pay-btn" id="payBtn">💎 Создать счёт</button>
    <div id="payResult"></div>
  </div>
  <div class="deposit-box">
    <h3>💸 Вывод TON</h3>
    <label>Сумма вывода (TON)</label>
    <input id="wdAmount" type="number" min="0.1" step="0.1" placeholder="Например, 1">
    <label>Ваш TON-кошелёк</label>
    <input id="wdWallet" type="text" placeholder="UQ...">
    <button class="wd-btn" id="wdBtn">📤 Запросить вывод</button>
    <div id="wdResult"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" data-tab="home"><i class="fa-solid fa-house"></i></button>
  <button class="nav-btn" data-tab="referral"><i class="fa-solid fa-user-group"></i></button>
  <button class="nav-btn" data-tab="staking"><i class="fa-solid fa-coins"></i></button>
  <button class="nav-btn" data-tab="tasks"><i class="fa-solid fa-list-check"></i></button>
  <button class="nav-btn" data-tab="wallet"><i class="fa-solid fa-wallet"></i></button>
</div>
</div>

<div id="loading" class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Загрузка данных...</div>

<script>
const API = "/api/game";
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const initData = (tg && tg.initData) || (location.hash.startsWith("#dev:") ? location.hash.slice(1) : "");
const startParam = tg && tg.initDataUnsafe ? tg.initDataUnsafe.start_param : null;

const tgUser = tg && tg.initDataUnsafe ? tg.initDataUnsafe.user : null;
const userIdGuess = tgUser?.id || "guest";

const GPU_EMOJIS = ["🎮", "🟢", "🔵", "🟣"];

let state = null;
let timerHandle = null;

function showAlert(msg) {
  if (tg && tg.showAlert) tg.showAlert(msg); else alert(msg);
}

async function api(path, body) {
  const res = await fetch(API + path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ initData, ...(body || {}) }),
  });
  let data = null;
  try { data = await res.json(); } catch {}
  if (!res.ok) {
    const msg = (data && (data.error || data.detail)) || ("HTTP " + res.status);
    throw new Error(msg);
  }
  return data;
}

function setHeader(s) {
  document.getElementById("ton").innerText = (s.ton ?? 0).toFixed(2);
  document.getElementById("gpuBalance").innerText = s.gpu ?? 0;
  document.getElementById("friendCount").innerText = s.friendsCount ?? 0;
  document.getElementById("refLink").innerText = s.referralBotLink || "";
  const name = s.name || "Игрок";
  document.getElementById("userFirstName").innerText = name;
  document.getElementById("userStatus").innerText = s.username ? "@" + s.username : ("ID " + s.userId);
  document.getElementById("userIdShort").innerText = "#" + String(s.userId).slice(-5);
  document.getElementById("avatar").innerText = name[0] ? name[0].toUpperCase() : "👤";
}

function findOwnedFor(typeId) {
  return (state?.ownedGpus || []).find(o => o.gpuTypeId === typeId);
}

function renderGrid() {
  const grid = document.getElementById("grid");
  if (!state) { grid.innerHTML = ""; return; }
  grid.innerHTML = state.templates.map((t, i) => {
    const owned = findOwnedFor(t.id);
    const emoji = GPU_EMOJIS[i] || "🎮";
    let body;
    if (!owned) {
      body = `
        <div class="rewards-info">
          <span>💰 ${t.tonReward} TON</span>
          <span>⚡ ${t.gpuReward} GPU</span>
          <span>⏱ ${Math.round(t.durationMs/1000)}с</span>
        </div>
        <button data-buy="${t.id}">Купить за ${t.price} TON</button>`;
    } else if (owned.ready) {
      body = `
        <div class="rewards-info"><span>✅ Готово к сбору</span></div>
        <button class="claim-btn" data-claim="${owned.id}">Забрать ${owned.totalTon} TON + ${owned.totalGpu} GPU</button>`;
    } else {
      const now = Date.now();
      const elapsed = Math.max(0, now - (owned.startedAt || now));
      const p = Math.min(1, elapsed / owned.durationMs);
      body = `
        <div class="progress-bar">
          <div class="progress-fill" id="fill_${owned.id}" style="width:${(p*100).toFixed(1)}%"></div>
          <div class="progress-text" id="text_${owned.id}">${(owned.totalTon * p).toFixed(2)} / ${owned.totalTon} TON</div>
        </div>`;
    }
    return `
      <div class="card">
        <div class="gpu-emoji">${emoji}</div>
        <div class="card-info">
          <h3>${t.name} <span class="badge">${t.tonReward} TON</span></h3>
          ${body}
        </div>
      </div>`;
  }).join("");
}

function renderRefClaim() {
  const box = document.getElementById("refClaimBox");
  if (!state) { box.innerHTML = ""; return; }
  if (state.refClaimAvailable > 0) {
    box.innerHTML = `<button class="claim-btn" id="refClaimBtn">🎁 Забрать ${state.refClaimAvailable} TON + ${state.refClaimAvailableGpu} GPU</button>`;
    document.getElementById("refClaimBtn").onclick = onClaimRef;
  } else {
    box.innerHTML = "";
  }
}

function renderFriends() {
  const list = document.getElementById("friendsList");
  if (!state || state.friends.length === 0) {
    list.innerHTML = '<div style="text-align:center; padding:10px; color:#6B7CA8;">😢 У вас пока нет приглашённых друзей</div>';
    return;
  }
  list.innerHTML = state.friends.map(f => {
    const d = new Date(f.joinedAt);
    const dStr = d.toLocaleDateString("ru-RU");
    return `<div class="friend-item">
      <div class="friend-avatar">👤</div>
      <div class="friend-info">
        <div class="friend-name">${(f.name || "Друг").replace(/[<>]/g, "")}</div>
        <div class="friend-date">Присоединился: ${dStr}</div>
      </div>
    </div>`;
  }).join("");
}

function tickProgress() {
  if (!state) return;
  let needsRerender = false;
  state.ownedGpus.forEach(o => {
    if (o.ready || o.startedAt == null) return;
    const elapsed = Date.now() - o.startedAt;
    const p = Math.min(1, elapsed / o.durationMs);
    const fill = document.getElementById("fill_" + o.id);
    const txt = document.getElementById("text_" + o.id);
    if (fill) fill.style.width = (p*100).toFixed(1) + "%";
    if (txt) txt.innerText = (o.totalTon * p).toFixed(2) + " / " + o.totalTon + " TON";
    if (p >= 1) needsRerender = true;
  });
  if (needsRerender) refresh().catch(()=>{});
}

async function onBuy(typeId) {
  try {
    state = await api("/buy", { gpuTypeId: typeId });
    paint();
  } catch (e) { showAlert("❌ " + e.message); }
}

async function onClaim(ownedId) {
  try {
    state = await api("/claim", { ownedGpuId: ownedId });
    paint();
  } catch (e) { showAlert("❌ " + e.message); }
}

async function onClaimRef() {
  try {
    state = await api("/claim-referral", {});
    paint();
  } catch (e) { showAlert("❌ " + e.message); }
}

async function onDeposit() {
  const amt = parseFloat(document.getElementById("depositAmount").value);
  const out = document.getElementById("payResult");
  if (!amt || amt <= 0) { out.innerHTML = '<div class="pay-err">Введите сумму больше 0</div>'; return; }
  try {
    const r = await api("/deposit", { amount: amt });
    out.innerHTML = `
      <div class="pay-info">
        <div class="row"><div class="lbl">Кошелёк проекта</div><div class="val">${r.wallet}</div></div>
        <div class="row"><div class="lbl">Комментарий (обязательно!)</div><div class="val">${r.comment}</div></div>
        <div class="row"><div class="lbl">Сумма</div><div class="val">${r.amount} TON</div></div>
        <div class="pay-warn">⚠️ Отправьте точную сумму с указанным комментарием. После проверки админом баланс будет зачислен.</div>
      </div>`;
  } catch (e) {
    out.innerHTML = `<div class="pay-err">❌ ${e.message}</div>`;
  }
}

async function onWithdraw() {
  const amt = parseFloat(document.getElementById("wdAmount").value);
  const wallet = document.getElementById("wdWallet").value.trim();
  const out = document.getElementById("wdResult");
  if (!amt || amt <= 0) { out.innerHTML = '<div class="pay-err">Введите сумму больше 0</div>'; return; }
  if (!wallet || wallet.length < 4) { out.innerHTML = '<div class="pay-err">Укажите кошелёк</div>'; return; }
  try {
    const r = await api("/withdraw", { amount: amt, wallet });
    out.innerHTML = `<div class="pay-ok">✅ Заявка #${r.withdrawalId} принята. Ожидайте подтверждения от администратора.</div>`;
    document.getElementById("wdAmount").value = "";
    await refresh();
  } catch (e) {
    out.innerHTML = `<div class="pay-err">❌ ${e.message}</div>`;
  }
}

function paint() {
  if (!state) return;
  setHeader(state);
  renderGrid();
  renderRefClaim();
  renderFriends();
}

async function refresh() {
  state = await api("/sync", { startParam });
  paint();
}

function openTab(name, btn) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(name).classList.add("active");
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}
document.addEventListener("click", (e) => {
  const t = e.target.closest("[data-buy]");
  if (t) { onBuy(parseInt(t.dataset.buy, 10)); return; }
  const c = e.target.closest("[data-claim]");
  if (c) { onClaim(parseInt(c.dataset.claim, 10)); return; }
  const nav = e.target.closest(".nav-btn[data-tab]");
  if (nav) { openTab(nav.dataset.tab, nav); }
});
document.getElementById("payBtn").onclick = onDeposit;
document.getElementById("wdBtn").onclick = onWithdraw;
document.getElementById("copyRefBtn").onclick = () => {
  const txt = document.getElementById("refLink").innerText;
  navigator.clipboard?.writeText(txt).then(() => showAlert("Ссылка скопирована"), () => {});
};
(async () => {
  try {
    await refresh();
    document.getElementById("loading").style.display = "none";
    document.getElementById("app").style.display = "block";
    timerHandle = setInterval(tickProgress, 500);
  } catch (e) {
    document.getElementById("loading").innerHTML =
      `<div class="pay-err" style="margin:0 16px;">❌ ${e.message}<br><br>Откройте мини-приложение через бота @${"Gputonminer_bot"}.</div>`;
  }
})();
</script>
</body>
</html>
