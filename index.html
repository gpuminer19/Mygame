<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>TonMine</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0f1b4a, #050816);
  color:white;
}

/* HERO */
.hero {
  padding:20px;
  border-radius:20px;
  margin:12px;
  background: linear-gradient(135deg,#0a1f5f,#081030);
  box-shadow: 0 0 30px rgba(46,123,255,0.2);
}

.hero h1 {
  font-size:20px;
  margin:0 0 6px;
}

.hero p {
  font-size:13px;
  opacity:0.7;
}

/* BALANCE */
.balance {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:12px;
}

.balance-box {
  display:flex;
  align-items:center;
  gap:6px;
  background: rgba(46,123,255,0.15);
  border:1px solid #2e7bff;
  padding:8px 14px;
  border-radius:12px;
  font-weight:bold;
}

/* GRID */
.grid {
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(12px);
  border-radius:18px;
  padding:14px;
  display:flex;
  gap:12px;
  border:1px solid rgba(255,255,255,0.08);
  transition:0.2s;
}

.card:hover {
  transform: scale(1.02);
}

.gpu-img {
  width:90px;
}

/* TEXT */
.card-info h3 {
  margin:0;
  font-size:16px;
}

.card-info p {
  font-size:12px;
  opacity:0.6;
  margin:4px 0;
}

/* BUTTON */
.btn {
  background: linear-gradient(90deg,#2e7bff,#00d4ff);
  border:none;
  border-radius:10px;
  padding:10px;
  width:100%;
  color:white;
  font-weight:600;
  margin-top:6px;
}

/* CLAIM */
.claim-btn {
  background: linear-gradient(90deg,#00c853,#00e676);
}

/* PROGRESS */
.progress {
  margin-top:6px;
}

.bar {
  width:100%;
  height:18px;
  background:#1a224f;
  border-radius:10px;
  overflow:hidden;
  position:relative;
}

.fill {
  height:100%;
  width:0%;
  background: linear-gradient(90deg,#2e7bff,#00d4ff);
}

.text {
  position:absolute;
  width:100%;
  text-align:center;
  font-size:10px;
  top:2px;
}

/* MENU */
.menu {
  position:fixed;
  bottom:0;
  width:100%;
  height:60px;
  background:#050816;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid #111;
}

.menu button {
  background:none;
  border:none;
  color:white;
  opacity:0.4;
  font-size:20px;
}

.menu button.active {
  opacity:1;
  color:#2e7bff;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Майнинг начинается здесь</h1>
  <p>Покупай мощности и зарабатывай TON</p>

  <div class="balance">
    <div>Баланс</div>

    <div class="balance-box">
      <span id="ton">5.00</span> TON
    </div>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="menu">
  <button class="active"><i class="fa-solid fa-house"></i></button>
  <button><i class="fa-solid fa-coins"></i></button>
  <button><i class="fa-solid fa-list-check"></i></button>
  <button><i class="fa-solid fa-user-group"></i></button>
  <button><i class="fa-solid fa-wallet"></i></button>
</div>

<script>
let ton = 5;

const gpus = [
  {name:"GTX 1060", price:1},
  {name:"RTX 2060", price:2},
  {name:"RTX 3060", price:3},
];

function updateTon(){
  tonEl.innerText = ton.toFixed(2);
}

const tonEl = document.getElementById("ton");

function createCard(i){
  const g = gpus[i];

  const c = document.createElement("div");
  c.className = "card";
  c.id = "card"+i;

  c.innerHTML = `
    <img src="8.png" class="gpu-img">

    <div class="card-info">
      <h3>${g.name}</h3>
      <p>20% за 14 дней</p>

      <button class="btn" onclick="buy(${i})">
        Купить ${g.price} TON
      </button>
    </div>
  `;

  return c;
}

function buy(i){
  let g = gpus[i];
  if(ton < g.price) return alert("Недостаточно TON");

  ton -= g.price;
  updateTon();

  g.total = g.price * 1.2;
  g.earned = 0;

  document.getElementById("card"+i).innerHTML = `
    <img src="8.png" class="gpu-img">

    <div class="card-info">
      <h3>${g.name}</h3>

      <div class="progress">
        <div class="bar">
          <div class="fill" id="fill${i}"></div>
          <div class="text" id="text${i}">
            0 / ${g.total.toFixed(2)}
          </div>
        </div>
      </div>
    </div>
  `;

  startFarm(i);
}

function startFarm(i){
  let g = gpus[i];
  let step = 0;
  let max = 20;

  function loop(){
    if(step >= max){
      document.getElementById("card"+i).innerHTML = `
        <img src="8.png" class="gpu-img">

        <div class="card-info">
          <h3>${g.name}</h3>

          <button class="btn claim-btn" onclick="claim(${i})">
            Забрать ${g.total.toFixed(2)} TON
          </button>
        </div>
      `;
      return;
    }

    step++;
    g.earned += g.total / max;

    document.getElementById("fill"+i).style.width = (step/max*100)+"%";

    document.getElementById("text"+i).innerText =
      g.earned.toFixed(2)+" / "+g.total.toFixed(2);

    setTimeout(loop, 500);
  }

  loop();
}

function claim(i){
  ton += gpus[i].total;
  updateTon();

  document.getElementById("card"+i).replaceWith(createCard(i));
}

const grid = document.getElementById("grid");
gpus.forEach((_,i)=>grid.appendChild(createCard(i)));

updateTon();
</script>

</body>
</html>
